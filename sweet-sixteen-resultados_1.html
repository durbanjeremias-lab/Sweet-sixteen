<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados Sweet SixTeen 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pink-deep: #be185d; --pink-mid: #db2777; --pink-light: #f9a8d4;
    --pink-pale: #fce7f3; --pink-blush: #fdf2f8; --white: #ffffff;
    --text-dark: #831843; --text-mid: #9d174d; --text-soft: #be185d; --bow-pink: #f472b6;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--pink-blush); min-height: 100vh; overflow-x: hidden; position: relative; }
  .bg-layer { position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(249,168,212,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(251,207,232,0.4) 0%, transparent 60%),
    linear-gradient(160deg, #fdf2f8 0%, #fce7f3 40%, #fbcfe8 100%); }
  .floaties { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .floaty { position: absolute; opacity: 0.12; animation: floatUp linear infinite; font-size: 1.5rem; user-select: none; }
  @keyframes floatUp { 0%{transform:translateY(110vh) rotate(0deg);opacity:0} 10%{opacity:0.12} 90%{opacity:0.12} 100%{transform:translateY(-10vh) rotate(360deg);opacity:0} }

  main { position: relative; z-index: 10; min-height: 100vh; padding: 2rem 1rem; }

  /* ── Header ── */
  .header { text-align: center; padding: 2rem 1rem 1.5rem; }
  .header-kitty { width: 160px; height: auto; filter: drop-shadow(0 6px 24px rgba(219,39,119,0.28)); animation: kittyBounce 2.5s ease-in-out infinite, kittyGlow 3s ease-in-out infinite; margin-bottom: 0.5rem; cursor: pointer; }
  .header-kitty:hover { animation: kittyBounce 0.6s ease-in-out infinite, kittyGlow 1s ease-in-out infinite; filter: drop-shadow(0 8px 28px rgba(219,39,119,0.45)); }
  @keyframes kittyGlow { 0%,100%{filter:drop-shadow(0 6px 24px rgba(219,39,119,0.22))} 50%{filter:drop-shadow(0 8px 32px rgba(236,72,153,0.48))} }
  @keyframes kittyBounce { 0%,100%{transform:translateY(0) rotate(-1.5deg)} 50%{transform:translateY(-10px) rotate(1.5deg)} }
  .header-title { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 900; color: var(--pink-deep); line-height: 1.1; }
  .header-subtitle { font-size: 0.95rem; color: var(--text-mid); margin-top: 0.4rem; }
  .card-ribbon { height: 6px; background: linear-gradient(90deg,#f9a8d4,#ec4899,#db2777,#ec4899,#f9a8d4); background-size: 200% 100%; animation: ribbonShimmer 3s linear infinite; border-radius: 4px; margin: 1rem auto 0; max-width: 600px; }
  @keyframes ribbonShimmer { 0%{background-position:0%} 100%{background-position:200%} }

  /* ── Stats bar ── */
  .stats-bar { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin: 1.5rem auto; max-width: 700px; }
  .stat-pill { background: rgba(255,255,255,0.88); backdrop-filter: blur(12px); border: 1.5px solid rgba(249,168,212,0.4); border-radius: 50px; padding: 0.6rem 1.4rem; display: flex; align-items: center; gap: 0.5rem; box-shadow: 0 4px 16px rgba(219,39,119,0.08); }
  .stat-pill .stat-num { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900; color: var(--pink-deep); }
  .stat-pill .stat-lbl { font-size: 0.78rem; color: var(--text-mid); font-weight: 500; }

  /* ── Controls ── */
  .controls { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; margin: 0 auto 1.5rem; max-width: 700px; }
  .btn-primary { display: inline-flex; align-items: center; gap: 8px; padding: 11px 24px; border-radius: 50px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 600; color: white; background: linear-gradient(135deg,#ec4899 0%,#db2777 100%); box-shadow: 0 4px 16px rgba(219,39,119,0.28); transition: transform 0.2s, box-shadow 0.2s; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(219,39,119,0.38); }
  .btn-secondary { display: inline-flex; align-items: center; gap: 6px; padding: 11px 22px; border-radius: 50px; border: 1.5px solid var(--pink-light); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; color: var(--pink-mid); background: rgba(255,255,255,0.6); transition: all 0.2s; }
  .btn-secondary:hover { background: var(--pink-pale); border-color: var(--pink-mid); }

  /* ── Empty state ── */
  .empty-state { text-align: center; padding: 4rem 2rem; background: rgba(255,255,255,0.75); backdrop-filter: blur(16px); border-radius: 28px; border: 1.5px solid rgba(249,168,212,0.35); max-width: 480px; margin: 0 auto; box-shadow: 0 8px 32px rgba(219,39,119,0.10); }
  .empty-emoji { font-size: 3.5rem; line-height: 1; }
  .empty-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--pink-deep); margin: 0.8rem 0 0.4rem; }
  .empty-text { color: var(--text-mid); font-size: 0.9rem; line-height: 1.6; }

  /* ── Question columns ── */
  .questions-grid { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }

  .question-block { background: rgba(255,255,255,0.88); backdrop-filter: blur(16px); border-radius: 24px; border: 1.5px solid rgba(249,168,212,0.35); box-shadow: 0 4px 24px rgba(219,39,119,0.08); overflow: hidden; }
  .question-header { background: linear-gradient(135deg, rgba(249,168,212,0.22), rgba(252,231,243,0.25)); padding: 1rem 1.4rem; display: flex; align-items: flex-start; gap: 0.75rem; border-bottom: 1px solid rgba(249,168,212,0.22); }
  .q-badge { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--bow-pink); background: rgba(249,168,212,0.22); padding: 4px 12px; border-radius: 50px; border: 1px solid rgba(249,168,212,0.45); white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .q-text { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; color: var(--text-dark); line-height: 1.4; }

  .answers-row { display: flex; flex-wrap: wrap; gap: 0; }
  .answer-cell { flex: 1 1 180px; padding: 0.9rem 1.2rem; border-right: 1px solid rgba(249,168,212,0.18); border-bottom: 1px solid rgba(249,168,212,0.18); display: flex; flex-direction: column; gap: 0.25rem; transition: background 0.2s; }
  .answer-cell:last-child { border-right: none; }
  .answer-cell:hover { background: rgba(252,231,243,0.35); }
  .participant-name-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--bow-pink); }
  .answer-text { font-size: 0.92rem; color: var(--text-dark); line-height: 1.5; }
  .answer-empty { font-size: 0.85rem; color: rgba(155,110,130,0.5); font-style: italic; }

  /* ── Participant cards (top section) ── */
  .participants-section { max-width: 1100px; margin: 0 auto 1.5rem; }
  .section-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); margin-bottom: 0.7rem; display: flex; align-items: center; gap: 0.5rem; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: rgba(249,168,212,0.4); }
  .participants-chips { display: flex; flex-wrap: wrap; gap: 0.6rem; }
  .participant-chip { background: linear-gradient(135deg,#ec4899,#db2777); color: white; border-radius: 50px; padding: 6px 18px; font-size: 0.82rem; font-weight: 600; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 6px; box-shadow: 0 3px 10px rgba(219,39,119,0.28); }
  .participant-chip .chip-time { font-size: 0.7rem; opacity: 0.8; font-weight: 400; }

  /* ── Delete confirm overlay ── */
  .overlay { position: fixed; inset: 0; background: rgba(131,24,67,0.18); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .overlay-card { background: white; border-radius: 24px; padding: 2rem; max-width: 360px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(219,39,119,0.22); border: 1.5px solid rgba(249,168,212,0.4); }
  .overlay-emoji { font-size: 3rem; }
  .overlay-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--pink-deep); margin: 0.6rem 0 0.3rem; }
  .overlay-text { color: var(--text-mid); font-size: 0.88rem; margin-bottom: 1.2rem; }
  .overlay-btns { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; }
  .btn-danger { padding: 10px 22px; border-radius: 50px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; color: white; background: linear-gradient(135deg, #e11d48, #be123c); box-shadow: 0 4px 12px rgba(225,29,72,0.32); transition: transform 0.2s; }
  .btn-danger:hover { transform: translateY(-2px); }

  /* ── View toggle ── */
  .view-toggle { display: flex; gap: 0.4rem; background: rgba(255,255,255,0.6); border: 1.5px solid rgba(249,168,212,0.35); border-radius: 50px; padding: 4px; }
  .view-btn { padding: 7px 18px; border-radius: 50px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600; color: var(--text-mid); background: transparent; transition: all 0.2s; }
  .view-btn.active { background: linear-gradient(135deg,#ec4899,#db2777); color: white; box-shadow: 0 3px 10px rgba(219,39,119,0.28); }

  /* ── Score view ── */
  .score-grid { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 0.75rem; }
  .score-row { background: rgba(255,255,255,0.88); backdrop-filter: blur(12px); border-radius: 18px; border: 1.5px solid rgba(249,168,212,0.35); padding: 0.9rem 1.3rem; display: flex; align-items: center; gap: 1rem; box-shadow: 0 3px 14px rgba(219,39,119,0.07); }
  .score-rank { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; color: rgba(249,168,212,0.5); min-width: 36px; text-align: center; }
  .score-rank.top1 { color: #f59e0b; }
  .score-rank.top2 { color: #94a3b8; }
  .score-rank.top3 { color: #c2875e; }
  .score-info { flex: 1; }
  .score-name { font-weight: 700; color: var(--text-dark); font-size: 0.98rem; }
  .score-date { font-size: 0.73rem; color: var(--text-soft); opacity: 0.8; }
  .score-bar-wrap { flex: 2; max-width: 220px; }
  .score-bar-bg { height: 8px; background: rgba(249,168,212,0.25); border-radius: 8px; overflow: hidden; }
  .score-bar-fill { height: 100%; background: linear-gradient(90deg,#f9a8d4,#ec4899); border-radius: 8px; transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1); }
  .score-pct { font-size: 0.8rem; font-weight: 700; color: var(--pink-mid); margin-top: 3px; }

  @media(max-width: 640px) {
    .header-title { font-size: 1.8rem; }
    .answer-cell { flex: 1 1 140px; }
    .stat-pill { padding: 0.5rem 1rem; }
    .score-bar-wrap { display: none; }
    .score-row { gap: 0.7rem; }
  }
</style>
</head>

];

let currentView = 'table';
let responses = [];

function loadData() {
  try {
    responses = JSON.parse(localStorage.getItem('quiz_responses_s16') || '[]');
  } catch(e) {
    responses = [];
  }
}

function refresh() {
  loadData();
  render();
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-view-' + v).classList.add('active');
  render();
}

function confirmClear() {
  document.getElementById('confirm-overlay').style.display = 'flex';
}
function closeConfirm() {
  document.getElementById('confirm-overlay').style.display = 'none';
}
function clearAll() {
  localStorage.removeItem('quiz_responses_s16');
  responses = [];
  closeConfirm();
  render();
}

function formatTime(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleString('es-AR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
  } catch(e) { return ''; }
}

function countAnswers(r) {
  let c = 0;
  for (let i = 1; i <= 22; i++) {
    if (r[`q${i}`] && r[`q${i}`].trim()) c++;
  }
  return c;
}

function render() {
  const content = document.getElementById('main-content');

  if (responses.length === 0) {
    document.getElementById('stats-bar').style.display = 'none';
    content.innerHTML = `
      <div class="empty-state">
        <div class="empty-emoji">🎀</div>
        <h2 class="empty-title">¡Todavía no hay respuestas!</h2>
        <p class="empty-text">Compartí el quiz con tus amigos y amigas para que jueguen. Las respuestas van a aparecer acá automáticamente.</p>
        <br>
        <button class="btn-primary" onclick="refresh()">🔄 Revisar de nuevo</button>
      </div>`;
    return;
  }

  // Stats
  const totalAnswers = responses.reduce((s, r) => s + countAnswers(r), 0);
  document.getElementById('stats-bar').style.display = 'flex';
  document.getElementById('stat-participants').textContent = responses.length;
  document.getElementById('stat-answers').textContent = totalAnswers;

  if (currentView === 'table') {
    renderTable(content);
  } else {
    renderScore(content);
  }
}

function renderTable(content) {
  let html = '';

  // Participants chips
  html += `<div class="participants-section">
    <div class="section-label">💖 Participantes</div>
    <div class="participants-chips">`;
  responses.forEach(r => {
    const cnt = countAnswers(r);
    html += `<div class="participant-chip">
      💗 ${escHtml(r.participant_name || 'Anónimo')}
      <span class="chip-time">${cnt}/22 · ${formatTime(r.submitted_at)}</span>
    </div>`;
  });
  html += `</div></div>`;

  // Questions table
  html += `<div class="questions-grid">`;

  QUESTIONS.forEach((q, i) => {
    const n = i + 1;
    html += `<div class="question-block">
      <div class="question-header">
        <span class="q-badge">Pregunta ${n}</span>
        <span class="q-text">${escHtml(q)}</span>
      </div>
      <div class="answers-row">`;

    responses.forEach(r => {
      const ans = (r[`q${n}`] || '').trim();
      html += `<div class="answer-cell">
        <span class="participant-name-label">${escHtml(r.participant_name || 'Anónimo')}</span>
        ${ans
          ? `<span class="answer-text">${escHtml(ans)}</span>`
          : `<span class="answer-empty">sin respuesta</span>`}
      </div>`;
    });

    html += `</div></div>`;
  });

  html += `</div>`;
  content.innerHTML = html;
}

function renderScore(content) {
  // Sort by number of answers desc, then by date asc
  const ranked = [...responses].map(r => ({
    ...r,
    count: countAnswers(r)
  })).sort((a, b) => b.count - a.count || new Date(a.submitted_at) - new Date(b.submitted_at));

  const max = ranked.length > 0 ? Math.max(...ranked.map(r => r.count)) : 1;

  const medals = ['🥇', '🥈', '🥉'];
  const rankClasses = ['top1','top2','top3'];

  let html = `<div class="score-grid">`;
  ranked.forEach((r, idx) => {
    const pct = Math.round((r.count / 22) * 100);
    const medal = medals[idx] || `#${idx+1}`;
    const cls = rankClasses[idx] || '';
    html += `<div class="score-row">
      <div class="score-rank ${cls}">${medal}</div>
      <div class="score-info">
        <div class="score-name">💗 ${escHtml(r.participant_name || 'Anónimo')}</div>
        <div class="score-date">${formatTime(r.submitted_at)}</div>
      </div>
      <div style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--pink-deep);white-space:nowrap;">${r.count}/22</div>
      <div class="score-bar-wrap">
        <div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%"></div></div>
        <div class="score-pct">${pct}% completado</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // Add note
  html += `<p style="text-align:center;color:var(--text-soft);font-size:0.8rem;margin-top:1.2rem;opacity:0.75;">
    El ranking muestra cuántas preguntas respondió cada persona ✨<br>
    ¡Todas las respuestas cuentan!
  </p>`;

  content.innerHTML = html;
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function buildFloaties() {
  const wrap = document.getElementById('floaties');
  const items = ['🎀','💖','✨','🌸','💗','🎂','⭐','💝','🦋','🌷'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('span');
    el.className = 'floaty';
    el.textContent = items[Math.floor(Math.random() * items.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (Math.random() * 20 + 15) + 's';
    el.style.animationDelay = (Math.random() * 20) + 's';
    el.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
    wrap.appendChild(el);
  }
}

buildFloaties();
loadData();
render();

// Auto-refresh each 30s in case someone completes the quiz in another tab
setInterval(() => { loadData(); render(); }, 30000);
</script>
</body>
</html>
